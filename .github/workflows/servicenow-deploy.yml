# =============================================================================
# ServiceNow — Promote Dev to Test
#
# Automatically discovers all completed Update Sets in dev that have not yet
# been committed to test, presents the list for human review, then transfers,
# previews, and commits each set in order.
#
# Robustness features:
#   - Fails hard if test is ahead of dev (committed sets on test with no match
#     in dev's complete sets), requiring manual cleanup before proceeding.
#   - Per-set precheck at deploy time queries test live so manual deployments
#     made between discovery and deployment are handled correctly:
#       committed   → skip (idempotent)
#       previewed   → resume from commit step
#       loaded      → resume from preview step
#       not found   → full transfer → preview → commit
#   - Commit step polls until complete rather than sleeping a fixed interval,
#     so large update sets don't fail due to async processing timing.
#
# FUTURE EXTENSIONS (see roadmap in README):
#   Phase 2 — Bravium code linting: add a 'lint' job between discover and
#              await-approval; run Bravium CLI against exported XML artifacts
#   Phase 2 — Human approval: already implemented via 'deploy-test' environment
#   Phase 3 — Playwright / SauceLabs: add a 'verify' job after 'deploy' that
#              triggers your Playwright suite against test in SauceLabs
#   Phase 4 — Changelog: add a 'changelog' step in 'summary' to generate
#              CHANGELOG entries and create a GitHub Release with set names + label
#   Phase 4 — ServiceNow Change Request: add steps in 'deploy' to create a
#              sys_change_request before the first set and close it after the last
# =============================================================================

name: ServiceNow — Promote Dev to Test

run-name: "${{ inputs.deployment_label }} (by ${{ github.actor }})"

on:
  workflow_dispatch:
    inputs:
      deployment_label:
        description: 'Deployment label — describe what this release contains'
        required: false
        type: string
        default: "Promote dev to test"
      dry_run:
        description: "Dry run — show what would be deployed, skip approval and deploy"
        required: false
        type: boolean
        default: false

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1: Discover
  # Queries both instances and computes the delta — complete sets in dev that
  # have not yet been committed on test. Writes a review table to Step Summary.
  # Fails hard if test is ahead of dev. The reviewer reads the summary table
  # before clicking Approve in Job 2.
  # ---------------------------------------------------------------------------
  discover:
    name: Discover Update Sets
    runs-on: ubuntu-latest
    outputs:
      sets_json: ${{ steps.diff.outputs.sets_json }}
      set_count: ${{ steps.diff.outputs.set_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover update sets
        id: diff
        env:
          SN_DEV_INSTANCE: ${{ secrets.SN_DEV_INSTANCE }}
          SN_DEV_USER: ${{ secrets.SN_DEV_USERNAME }}
          SN_DEV_PASS: ${{ secrets.SN_DEV_PASSWORD }}
          SN_TEST_INSTANCE: ${{ secrets.SN_TEST_INSTANCE }}
          SN_TEST_USER: ${{ secrets.SN_TEST_USERNAME }}
          SN_TEST_PASS: ${{ secrets.SN_TEST_PASSWORD }}
        run: python3 .github/scripts/discover.py

      - name: Nothing to deploy — exit early
        if: steps.diff.outputs.set_count == '0'
        run: |
          echo "::notice::Test is already up to date. No update sets to promote."

  # ---------------------------------------------------------------------------
  # JOB 2: Await Approval
  # Uses a GitHub Environment with required reviewers to pause the workflow.
  # The reviewer sees the Job 1 Step Summary table (the deployment list) in the
  # Actions UI and clicks Approve or Deny.
  #
  # Setup: Go to Settings → Environments → New environment → Name: deploy-test
  #        Add required reviewers. Set a timeout if desired.
  #
  # On Approve → deploy job runs.
  # On Deny / timeout → workflow is cancelled; both instances unchanged.
  # ---------------------------------------------------------------------------
  await-approval:
    name: Await Deployment Approval
    needs: discover
    # Skip if nothing to deploy or this is a dry run (discover only)
    if: |
      needs.discover.outputs.set_count != '0' &&
      inputs.dry_run != true
    runs-on: ubuntu-latest
    environment: deploy-test

    steps:
      - name: Deployment approved
        run: |
          echo "Approved by: ${{ github.actor }}"
          echo "Label: ${{ inputs.deployment_label }}"
          echo "Update sets to deploy: ${{ needs.discover.outputs.set_count }}"

  # ---------------------------------------------------------------------------
  # JOB 3: Deploy
  # Processes each update set sequentially (max-parallel: 1) in creation-date
  # order. A precheck queries test live at the start of each set's job to
  # handle any state changes that occurred during the approval wait.
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy: ${{ matrix.update_set.name }}"
    needs: [discover, await-approval]
    # Only runs after a successful explicit approval
    if: needs.await-approval.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        update_set: ${{ fromJson(needs.discover.outputs.sets_json) }}
      max-parallel: 1   # Sequential: preserves dependency ordering
      fail-fast: true   # Stop remaining sets if one fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 0: Precheck
      # Queries test live for this update set's current state.
      # Outputs `action` (deploy | resume_loaded | resume_previewed | skip)
      # and `remote_sys_id` if the set already exists on test.
      # All subsequent steps condition on `action`.
      # -----------------------------------------------------------------------
      - name: "0/4 — Precheck state on test"
        id: precheck
        env:
          SN_INSTANCE: ${{ secrets.SN_TEST_INSTANCE }}
          SN_USER: ${{ secrets.SN_TEST_USERNAME }}
          SN_PASS: ${{ secrets.SN_TEST_PASSWORD }}
          SET_NAME: ${{ matrix.update_set.name }}
        run: python3 .github/scripts/precheck.py

      # -----------------------------------------------------------------------
      # Step 1: Transfer
      # Calls the CI/CD Update Set Retrieve API on test. Test pulls the update
      # set directly from dev using credentials stored in a pre-configured
      # Remote Update Source (sys_update_set_source) record on test.
      # Setup: System Update Sets → Update Sources → New (on test instance).
      #        Store the record's sys_id as secret SN_DEV_UPDATE_SOURCE_ID.
      # Skipped when resuming from a partial state (set already exists on test).
      # -----------------------------------------------------------------------
      - name: "1/4 — Transfer update set to test"
        id: transfer
        if: steps.precheck.outputs.action == 'deploy'
        env:
          SN_TEST_INSTANCE: ${{ secrets.SN_TEST_INSTANCE }}
          SN_TEST_USER: ${{ secrets.SN_TEST_USERNAME }}
          SN_TEST_PASS: ${{ secrets.SN_TEST_PASSWORD }}
          SN_DEV_UPDATE_SOURCE_ID: ${{ secrets.SN_DEV_UPDATE_SOURCE_ID }}
          SYS_ID: ${{ matrix.update_set.sys_id }}
          SET_NAME: ${{ matrix.update_set.name }}
        run: python3 .github/scripts/transfer.py

      # -----------------------------------------------------------------------
      # Step 2: Preview
      # Triggers collision-detection preview (skipped if already previewed),
      # polls until the state reaches 'previewed', then checks for conflicts.
      # Skipped only when the set was already committed (action=skip).
      # -----------------------------------------------------------------------
      - name: "2/4 — Preview on test"
        id: preview
        if: steps.precheck.outputs.action != 'skip'
        env:
          SN_INSTANCE: ${{ secrets.SN_TEST_INSTANCE }}
          SN_USER: ${{ secrets.SN_TEST_USERNAME }}
          SN_PASS: ${{ secrets.SN_TEST_PASSWORD }}
          REMOTE_SYS_ID: ${{ steps.precheck.outputs.remote_sys_id || steps.transfer.outputs.remote_sys_id }}
          SET_NAME: ${{ matrix.update_set.name }}
        run: python3 .github/scripts/poll_preview.py

      # -----------------------------------------------------------------------
      # Step 3: Commit
      # Calls the ServiceNow commit processor, then polls until 'committed'.
      # Skipped only when the set was already committed (action=skip).
      # -----------------------------------------------------------------------
      - name: "3/4 — Commit on test"
        id: commit
        if: steps.precheck.outputs.action != 'skip'
        env:
          SN_INSTANCE: ${{ secrets.SN_TEST_INSTANCE }}
          SN_USER: ${{ secrets.SN_TEST_USERNAME }}
          SN_PASS: ${{ secrets.SN_TEST_PASSWORD }}
          REMOTE_SYS_ID: ${{ steps.precheck.outputs.remote_sys_id || steps.transfer.outputs.remote_sys_id }}
          SET_NAME: ${{ matrix.update_set.name }}
        run: python3 .github/scripts/commit.py

      # -----------------------------------------------------------------------
      # Step 4: Skip notice
      # Runs only when the set was already committed on test (action=skip).
      # -----------------------------------------------------------------------
      - name: "4/4 — Already committed (skipped)"
        if: steps.precheck.outputs.action == 'skip'
        run: |
          echo "::notice::Update set '${{ matrix.update_set.name }}' was already committed on test. No action taken."
          {
            echo "### Skipped (already committed): \`${{ matrix.update_set.name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # JOB 4: Summary
  # Always runs. Writes a final report to the GitHub Step Summary.
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    needs: [discover, await-approval, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Write final report
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Label | ${{ inputs.deployment_label }} |"
            echo "| Dry Run | ${{ inputs.dry_run }} |"
            echo "| Update Sets Found | ${{ needs.discover.outputs.set_count }} |"
            echo "| Discover | ${{ needs.discover.result }} |"
            echo "| Approval | ${{ needs.await-approval.result }} |"
            echo "| Deploy | ${{ needs.deploy.result }} |"
            echo ""

            if [ "${{ needs.deploy.result }}" = "success" ]; then
              echo "**All update sets successfully committed to test.**"
            elif [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "**Dry run — discovery complete. No changes were made.**"
            elif [ "${{ needs.await-approval.result }}" = "failure" ]; then
              echo "**Deployment rejected or timed out at approval gate. No changes were made.**"
            elif [ "${{ needs.discover.outputs.set_count }}" = "0" ]; then
              echo "**Nothing to deploy — test is already up to date.**"
            else
              echo "**Deployment failed — review the deploy job logs above.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
